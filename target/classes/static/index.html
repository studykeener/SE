<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外文物平台后台</title>
    <style>
        :root { --bg:#f3f5f9; --panel:#fff; --line:#e6eaf2; --text:#1f2a44; --muted:#6b7280; --primary:#2563eb; --danger:#dc2626; --success:#16a34a; --shadow:0 8px 20px rgba(15,23,42,.06); }
        * { box-sizing: border-box; }
        body { margin:0; font-family:"Microsoft YaHei", Arial, sans-serif; background:var(--bg); color:var(--text); }
        .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .login-card { width:100%; max-width:460px; background:var(--panel); border-radius:14px; padding:28px; box-shadow:var(--shadow); border:1px solid var(--line); }
        .login-title { margin:0 0 8px; font-size:22px; }
        .login-subtitle { margin:0 0 18px; color:var(--muted); font-size:14px; }
        .input, .select { width:100%; height:40px; border:1px solid var(--line); border-radius:8px; padding:0 12px; margin-bottom:10px; background:#fff; }
        .btn { height:38px; border:0; border-radius:8px; padding:0 14px; cursor:pointer; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-light { background:#eef2ff; color:var(--primary); }
        .btn-danger { background:#fee2e2; color:var(--danger); }
        .btn-success { background:#dcfce7; color:#166534; }
        .btn-row { display:flex; gap:8px; margin-top:6px; }
        .msg { margin-top:8px; font-size:14px; }
        .ok { color:var(--success); }
        .err { color:var(--danger); }
        #app { display:none; height:100vh; }
        .layout { display:flex; height:100vh; }
        .sidebar { width:230px; background:#111827; color:#e5e7eb; padding:18px 12px; }
        .brand { font-size:16px; font-weight:700; margin:0 10px 14px; }
        .menu { display:flex; flex-direction:column; gap:6px; }
        .menu-btn { text-align:left; border:0; background:transparent; color:#d1d5db; padding:10px 12px; border-radius:8px; cursor:pointer; }
        .menu-btn.active, .menu-btn:hover { background:#1f2937; color:#fff; }
        .main { flex:1; display:flex; flex-direction:column; min-width:0; }
        .topbar { height:58px; background:var(--panel); border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; padding:0 16px; }
        .topbar-title { font-size:16px; font-weight:700; }
        .topbar-right { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px; }
        .content { padding:16px; overflow:auto; }
        .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; box-shadow:var(--shadow); margin-bottom:14px; }
        .panel h3 { margin:0 0 10px; font-size:16px; }
        .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
        .inline { display:flex; gap:8px; flex-wrap:wrap; }
        .inline .input, .inline .select { width:auto; min-width:140px; margin:0; }
        table { width:100%; border-collapse:collapse; font-size:13px; background:#fff; }
        th, td { border:1px solid var(--line); padding:8px; text-align:left; vertical-align:top; }
        th { background:#f8fafc; }
        .page { display:none; }
        .page.active { display:block; }
        .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; background:#e5e7eb; }
        .muted { color:var(--muted); }
    </style>
</head>
<body>
<div id="loginView" class="login-wrap">
    <div class="login-card">
        <h1 class="login-title">后台管理系统</h1>
        <p class="login-subtitle">海外藏中国文物知识管理与服务平台</p>
        <input class="input" id="username" placeholder="管理员账号">
        <input class="input" id="password" type="password" placeholder="管理员密码">
        <div class="btn-row">
            <button class="btn btn-primary" onclick="login()">登录</button>
            <button class="btn btn-light" onclick="bootstrap()">首次初始化</button>
        </div>
        <p id="loginMsg" class="msg"></p>
    </div>
</div>

<div id="app">
    <div class="layout">
        <aside class="sidebar">
            <p class="brand">文物平台后台</p>
            <div class="menu">
                <button class="menu-btn active" data-page="dashboardPage" onclick="switchPage('dashboardPage', this)">系统概览</button>
                <button class="menu-btn" data-page="adminPage" onclick="switchPage('adminPage', this)">管理员管理</button>
                <button class="menu-btn" data-page="rbacPage" onclick="switchPage('rbacPage', this)">角色权限管理</button>
                <button class="menu-btn" data-page="userPage" onclick="switchPage('userPage', this)">平台用户管理</button>
                <button class="menu-btn" data-page="reviewPage" onclick="switchPage('reviewPage', this)">内容审核</button>
                <button class="menu-btn" data-page="artifactPage" onclick="switchPage('artifactPage', this)">文物数据管理</button>
                <button class="menu-btn" data-page="logPage" onclick="switchPage('logPage', this)">日志管理</button>
            </div>
        </aside>
        <main class="main">
            <header class="topbar">
                <div class="topbar-title" id="pageTitle">系统概览</div>
                <div class="topbar-right">
                    <span id="me"></span>
                    <button class="btn btn-danger" onclick="logout()">退出登录</button>
                </div>
            </header>
            <section class="content">
                <div id="dashboardPage" class="page active">
                    <div class="panel">
                        <h3>欢迎使用后台管理系统</h3>
                        <p class="muted">左侧菜单可切换模块，页面已按后台系统布局拆分，不再堆叠在一页。</p>
                    </div>
                </div>
                <div id="adminPage" class="page">
                    <div class="panel">
                        <h3>管理员管理</h3>
                        <div class="toolbar"><button class="btn btn-light" onclick="loadAdmins()">刷新列表</button></div>
                        <div class="inline">
                            <input class="input" id="newAdminUsername" placeholder="新管理员用户名">
                            <input class="input" id="newAdminPassword" placeholder="新管理员密码">
                            <select class="select" id="newAdminRole">
                                <option value="SUPER_ADMIN">SUPER_ADMIN</option>
                                <option value="DATA_ADMIN">DATA_ADMIN</option>
                                <option value="CONTENT_REVIEWER">CONTENT_REVIEWER</option>
                            </select>
                            <button class="btn btn-primary" onclick="createAdmin()">创建管理员</button>
                        </div>
                        <p id="adminMsg" class="msg"></p>
                        <table id="adminTable"></table>
                    </div>
                </div>
                <div id="rbacPage" class="page">
                    <div class="panel">
                        <h3>角色与权限管理</h3>
                        <div class="toolbar">
                            <button class="btn btn-light" onclick="loadRolesAndPermissions()">刷新角色/权限</button>
                            <button class="btn btn-light" onclick="loadAdminsForAssign()">刷新管理员</button>
                        </div>
                        <div class="inline">
                            <input class="input" id="newRoleCode" placeholder="角色代码(如 CUSTOM_ROLE)">
                            <input class="input" id="newRoleName" placeholder="角色名称">
                            <input class="input" id="newRoleDesc" placeholder="描述">
                            <button class="btn btn-primary" onclick="createRole()">新增角色</button>
                        </div>
                        <div class="inline" style="margin-top:8px;">
                            <input class="input" id="assignAdminId" placeholder="管理员ID">
                            <input class="input" id="assignRoleIds" placeholder="角色ID列表,逗号分隔">
                            <button class="btn btn-primary" onclick="assignRolesToAdmin()">给管理员分配角色</button>
                        </div>
                        <div class="inline" style="margin-top:8px;">
                            <input class="input" id="assignPermRoleId" placeholder="角色ID">
                            <input class="input" id="assignPermIds" placeholder="权限ID列表,逗号分隔">
                            <button class="btn btn-primary" onclick="assignPermissionsToRole()">给角色分配权限</button>
                        </div>
                        <p id="rbacMsg" class="msg"></p>
                        <table id="roleTable"></table>
                        <table id="permissionTable" style="margin-top:10px;"></table>
                    </div>
                </div>
                <div id="userPage" class="page">
                    <div class="panel">
                        <h3>平台用户管理</h3>
                        <div class="toolbar"><button class="btn btn-light" onclick="loadPlatformUsers()">刷新列表</button></div>
                        <div class="inline">
                            <input class="input" id="newUserUsername" placeholder="用户名">
                            <input class="input" id="newUserEmail" placeholder="邮箱">
                            <select class="select" id="newUserSource">
                                <option value="WEB">WEB</option>
                                <option value="APP">APP</option>
                            </select>
                            <button class="btn btn-primary" onclick="createPlatformUser()">创建用户</button>
                        </div>
                        <p id="userMsg" class="msg"></p>
                        <table id="userTable"></table>
                    </div>
                </div>
                <div id="reviewPage" class="page">
                    <div class="panel">
                        <h3>内容审核</h3>
                        <div class="toolbar">
                            <select class="select" id="reviewFilterStatus">
                                <option value="">全部状态</option>
                                <option value="PENDING">PENDING</option>
                                <option value="APPROVED">APPROVED</option>
                                <option value="REJECTED">REJECTED</option>
                            </select>
                            <button class="btn btn-light" onclick="loadReviewContents()">刷新审核列表</button>
                        </div>
                        <div class="inline">
                            <select class="select" id="newReviewType">
                                <option value="COMMENT">COMMENT</option>
                                <option value="IMAGE">IMAGE</option>
                                <option value="VIDEO">VIDEO</option>
                                <option value="AUDIO">AUDIO</option>
                            </select>
                            <input class="input" id="newReviewSourceSystem" placeholder="来源子系统（WEB/APP）">
                            <input class="input" id="newReviewSubmitter" placeholder="提交人">
                            <input class="input" id="newReviewRiskScore" type="number" min="0" max="100" placeholder="风险分0-100">
                            <input class="input" id="newReviewUrl" placeholder="内容URL(可选)">
                            <input class="input" id="newReviewText" placeholder="内容文本" style="min-width:280px;">
                            <button class="btn btn-primary" onclick="createReviewContent()">新增待审核</button>
                        </div>
                        <p id="reviewMsg" class="msg"></p>
                        <table id="reviewTable"></table>
                    </div>
                </div>
                <div id="artifactPage" class="page">
                    <div class="panel">
                        <h3>文物数据管理</h3>
                        <div class="toolbar">
                            <button class="btn btn-light" onclick="loadArtifacts()">刷新列表</button>
                            <button class="btn btn-light" onclick="exportArtifacts()">导出CSV</button>
                        </div>
                        <div class="inline">
                            <input class="input" id="artifactId" placeholder="编辑时填ID(新增可空)">
                            <input class="input" id="artifactName" placeholder="文物名称">
                            <input class="input" id="artifactPeriod" placeholder="年代">
                            <input class="input" id="artifactType" placeholder="类型">
                            <input class="input" id="artifactMaterial" placeholder="材质">
                            <input class="input" id="artifactImageUrl" placeholder="图片URL">
                            <input class="input" id="artifactSourceSystem" placeholder="来源子系统">
                            <input class="input" id="artifactKgStatus" placeholder="图谱同步状态">
                            <button class="btn btn-primary" onclick="saveArtifact()">保存文物</button>
                        </div>
                        <p id="artifactMsg" class="msg"></p>
                        <table id="artifactTable"></table>
                    </div>
                </div>
                <div id="logPage" class="page">
                    <div class="panel">
                        <h3>日志与统计</h3>
                        <div class="toolbar">
                            <button class="btn btn-light" onclick="loadDashboard()">刷新统计</button>
                            <button class="btn btn-light" onclick="loadLogs()">操作日志</button>
                            <button class="btn btn-light" onclick="loadLoginLogs()">登录日志</button>
                            <button class="btn btn-light" onclick="loadDataChangeLogs()">数据修改日志</button>
                        </div>
                        <div id="dashboardCards" class="inline"></div>
                        <table id="logTable"></table>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>

<script>
    let jwtToken = localStorage.getItem("jwtToken") || "";
    const pageTitles = {
        dashboardPage: "系统概览",
        adminPage: "管理员管理",
        rbacPage: "角色权限管理",
        userPage: "平台用户管理",
        reviewPage: "内容审核",
        artifactPage: "文物数据管理",
        logPage: "日志与统计"
    };

    function setMsg(id, text, ok = true) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = ok ? "msg ok" : "msg err";
    }

    function switchPage(pageId, btnEl) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(pageId).classList.add("active");
        document.querySelectorAll(".menu-btn").forEach(b => b.classList.remove("active"));
        if (btnEl) btnEl.classList.add("active");
        document.getElementById("pageTitle").textContent = pageTitles[pageId] || "后台管理";
    }

    async function api(path, options = {}) {
        const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
        if (jwtToken) headers["Authorization"] = "Bearer " + jwtToken;
        const resp = await fetch(path, Object.assign({}, options, { headers }));
        const data = await resp.json();
        if (!resp.ok || !data.success) throw new Error(data.message || "请求失败");
        return data.data;
    }

    function showApp() {
        document.getElementById("loginView").style.display = "none";
        document.getElementById("app").style.display = "block";
    }

    function showLogin() {
        document.getElementById("app").style.display = "none";
        document.getElementById("loginView").style.display = "flex";
    }

    async function login() {
        try {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const resp = await fetch("/api/admin/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const result = await resp.json();
            if (!resp.ok || !result.success) throw new Error(result.message || "登录失败");
            jwtToken = result.data.token;
            localStorage.setItem("jwtToken", jwtToken);
            const me = result.data.adminUser;
            setMenuByRole(me.role, result.data.permissions || []);
            document.getElementById("me").textContent = `${me.username} | ${me.role}`;
            showApp();
            loadDashboard();
            loadAdmins();
            loadRolesAndPermissions();
            loadPlatformUsers();
            loadReviewContents();
            loadArtifacts();
            loadLogs();
            setMsg("loginMsg", "登录成功");
        } catch (e) {
            setMsg("loginMsg", e.message, false);
        }
    }

    async function bootstrap() {
        try {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            if (!username || !password) throw new Error("请输入要初始化的账号和密码");
            const resp = await fetch("/api/admin/auth/bootstrap", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password, role: "SUPER_ADMIN" })
            });
            const data = await resp.json();
            if (!resp.ok || !data.success) throw new Error(data.message || "初始化失败");
            setMsg("loginMsg", "初始化成功，请点击登录");
        } catch (e) {
            setMsg("loginMsg", e.message, false);
        }
    }

    function logout() {
        jwtToken = "";
        localStorage.removeItem("jwtToken");
        showLogin();
    }

    async function tryAutoLogin() {
        if (!jwtToken) return;
        try {
            const me = await api("/api/admin/auth/me");
            setMenuByRole(me.role, []);
            document.getElementById("me").textContent = `${me.username} | ${me.role}`;
            showApp();
            loadDashboard();
            loadAdmins();
            loadRolesAndPermissions();
            loadPlatformUsers();
            loadReviewContents();
            loadArtifacts();
            loadLogs();
        } catch (e) {
            jwtToken = "";
            localStorage.removeItem("jwtToken");
            showLogin();
        }
    }

    async function loadAdmins() {
        try {
            const data = await api("/api/admin/users");
            document.getElementById("adminTable").innerHTML =
                "<tr><th>ID</th><th>用户名</th><th>角色</th><th>状态</th><th>创建时间</th></tr>" +
                data.map(x => `<tr><td>${x.id}</td><td>${x.username}</td><td><span class="badge">${x.role}</span></td><td>${x.status}</td><td>${x.createdAt || ""}</td></tr>`).join("");
            setMsg("adminMsg", "加载成功");
        } catch (e) { setMsg("adminMsg", e.message, false); }
    }

    async function createAdmin() {
        try {
            const payload = {
                username: document.getElementById("newAdminUsername").value.trim(),
                password: document.getElementById("newAdminPassword").value.trim(),
                role: document.getElementById("newAdminRole").value
            };
            await api("/api/admin/users", { method: "POST", body: JSON.stringify(payload) });
            setMsg("adminMsg", "创建管理员成功");
            await loadAdmins();
        } catch (e) { setMsg("adminMsg", e.message, false); }
    }

    async function loadPlatformUsers() {
        try {
            const data = await api("/api/admin/platform-users");
            document.getElementById("userTable").innerHTML =
                "<tr><th>ID</th><th>用户名</th><th>邮箱</th><th>来源</th><th>状态</th><th>评论权限</th><th>上传权限</th></tr>" +
                data.map(x => `<tr><td>${x.id}</td><td>${x.username}</td><td>${x.email}</td><td>${x.source}</td><td>${x.status}</td><td>${x.commentAllowed}</td><td>${x.uploadAllowed}</td></tr>`).join("");
            setMsg("userMsg", "加载成功");
        } catch (e) { setMsg("userMsg", e.message, false); }
    }

    async function createPlatformUser() {
        try {
            const payload = {
                username: document.getElementById("newUserUsername").value.trim(),
                email: document.getElementById("newUserEmail").value.trim(),
                source: document.getElementById("newUserSource").value
            };
            await api("/api/admin/platform-users", { method: "POST", body: JSON.stringify(payload) });
            setMsg("userMsg", "创建平台用户成功");
            await loadPlatformUsers();
        } catch (e) { setMsg("userMsg", e.message, false); }
    }

    async function loadLogs() {
        try {
            const data = await api("/api/admin/logs");
            document.getElementById("logTable").innerHTML =
                "<tr><th>ID</th><th>操作人</th><th>类型</th><th>对象</th><th>详情</th><th>时间</th></tr>" +
                data.map(x => `<tr><td>${x.id}</td><td>${x.operator}</td><td>${x.operationType}</td><td>${x.operationTarget}</td><td>${x.details || ""}</td><td>${x.operationTime || ""}</td></tr>`).join("");
        } catch (e) { alert("日志加载失败: " + e.message); }
    }

    async function loadLoginLogs() {
        try {
            const data = await api("/api/admin/logs/login");
            document.getElementById("logTable").innerHTML =
                "<tr><th>ID</th><th>用户名</th><th>结果</th><th>IP</th><th>时间</th></tr>" +
                data.map(x => `<tr><td>${x.id}</td><td>${x.username}</td><td>${x.result}</td><td>${x.ipAddress || ""}</td><td>${x.loginTime || ""}</td></tr>`).join("");
        } catch (e) { alert("登录日志加载失败: " + e.message); }
    }

    async function loadDataChangeLogs() {
        try {
            const data = await api("/api/admin/logs/data-change");
            document.getElementById("logTable").innerHTML =
                "<tr><th>ID</th><th>操作人</th><th>变更类型</th><th>对象类型</th><th>对象ID</th><th>详情</th><th>时间</th></tr>" +
                data.map(x => `<tr><td>${x.id}</td><td>${x.operator}</td><td>${x.changeType}</td><td>${x.targetType}</td><td>${x.targetId}</td><td>${x.detail || ""}</td><td>${x.changeTime || ""}</td></tr>`).join("");
        } catch (e) { alert("数据修改日志加载失败: " + e.message); }
    }

    async function loadDashboard() {
        try {
            const data = await api("/api/admin/dashboard/overview");
            const trend = (data.loginTrend7d || []).map(x => `${x.date}:${x.count}`).join(" | ");
            document.getElementById("dashboardCards").innerHTML = `
                <span class="badge">总用户数: ${data.totalUsers}</span>
                <span class="badge">今日新增用户: ${data.todayNewUsers}</span>
                <span class="badge">待审核: ${data.pendingReviews}</span>
                <span class="badge">文物总数: ${data.totalArtifacts}</span>
                <span class="badge">近7天登录趋势: ${trend}</span>
            `;
        } catch (e) { console.log(e); }
    }

    async function loadRolesAndPermissions() {
        try {
            const roles = await api("/api/admin/rbac/roles");
            const perms = await api("/api/admin/rbac/permissions");
            document.getElementById("roleTable").innerHTML =
                "<tr><th>ID</th><th>代码</th><th>名称</th><th>描述</th></tr>" +
                roles.map(x => `<tr><td>${x.id}</td><td>${x.code}</td><td>${x.name}</td><td>${x.description || ""}</td></tr>`).join("");
            document.getElementById("permissionTable").innerHTML =
                "<tr><th>ID</th><th>代码</th><th>名称</th><th>描述</th></tr>" +
                perms.map(x => `<tr><td>${x.id}</td><td>${x.code}</td><td>${x.name}</td><td>${x.description || ""}</td></tr>`).join("");
            setMsg("rbacMsg", "角色权限数据已加载");
        } catch (e) { setMsg("rbacMsg", e.message, false); }
    }

    function parseIds(text) {
        return text.split(",").map(x => Number(x.trim())).filter(x => !Number.isNaN(x));
    }

    async function createRole() {
        try {
            const payload = {
                code: document.getElementById("newRoleCode").value.trim(),
                name: document.getElementById("newRoleName").value.trim(),
                description: document.getElementById("newRoleDesc").value.trim()
            };
            await api("/api/admin/rbac/roles", { method: "POST", body: JSON.stringify(payload) });
            setMsg("rbacMsg", "角色创建成功");
            await loadRolesAndPermissions();
        } catch (e) { setMsg("rbacMsg", e.message, false); }
    }

    async function assignRolesToAdmin() {
        try {
            const adminId = document.getElementById("assignAdminId").value.trim();
            const ids = parseIds(document.getElementById("assignRoleIds").value.trim());
            await api(`/api/admin/rbac/admins/${adminId}/roles`, { method: "POST", body: JSON.stringify({ ids }) });
            setMsg("rbacMsg", "管理员角色分配成功");
        } catch (e) { setMsg("rbacMsg", e.message, false); }
    }

    async function assignPermissionsToRole() {
        try {
            const roleId = document.getElementById("assignPermRoleId").value.trim();
            const ids = parseIds(document.getElementById("assignPermIds").value.trim());
            await api(`/api/admin/rbac/roles/${roleId}/permissions`, { method: "POST", body: JSON.stringify({ ids }) });
            setMsg("rbacMsg", "角色权限分配成功");
        } catch (e) { setMsg("rbacMsg", e.message, false); }
    }

    async function loadAdminsForAssign() {
        await loadAdmins();
        setMsg("rbacMsg", "管理员列表已刷新，可填ID分配角色");
    }

    async function loadArtifacts() {
        try {
            const data = await api("/api/admin/artifacts");
            document.getElementById("artifactTable").innerHTML =
                "<tr><th>ID</th><th>名称</th><th>年代</th><th>类型</th><th>材质</th><th>来源</th><th>图谱同步</th><th>操作</th></tr>" +
                data.map(x => `<tr><td>${x.id}</td><td>${x.name}</td><td>${x.period || ""}</td><td>${x.type || ""}</td><td>${x.material || ""}</td><td>${x.sourceSystem || ""}</td><td>${x.kgSyncStatus}</td><td><button class="btn btn-light" onclick="fillArtifact(${x.id}, '${(x.name || "").replace(/'/g, "\\'")}', '${(x.period || "").replace(/'/g, "\\'")}', '${(x.type || "").replace(/'/g, "\\'")}', '${(x.material || "").replace(/'/g, "\\'")}', '${(x.imageUrl || "").replace(/'/g, "\\'")}', '${(x.sourceSystem || "").replace(/'/g, "\\'")}', '${(x.kgSyncStatus || "").replace(/'/g, "\\'")}')">编辑</button></td></tr>`).join("");
            setMsg("artifactMsg", "文物列表加载成功");
        } catch (e) { setMsg("artifactMsg", e.message, false); }
    }

    function fillArtifact(id, name, period, type, material, imageUrl, sourceSystem, kgStatus) {
        document.getElementById("artifactId").value = id;
        document.getElementById("artifactName").value = name;
        document.getElementById("artifactPeriod").value = period;
        document.getElementById("artifactType").value = type;
        document.getElementById("artifactMaterial").value = material;
        document.getElementById("artifactImageUrl").value = imageUrl;
        document.getElementById("artifactSourceSystem").value = sourceSystem;
        document.getElementById("artifactKgStatus").value = kgStatus;
    }

    async function saveArtifact() {
        try {
            const id = document.getElementById("artifactId").value.trim();
            const payload = {
                name: document.getElementById("artifactName").value.trim(),
                period: document.getElementById("artifactPeriod").value.trim(),
                type: document.getElementById("artifactType").value.trim(),
                material: document.getElementById("artifactMaterial").value.trim(),
                imageUrl: document.getElementById("artifactImageUrl").value.trim(),
                sourceSystem: document.getElementById("artifactSourceSystem").value.trim(),
                sourceId: null,
                description: null,
                kgSyncStatus: document.getElementById("artifactKgStatus").value.trim()
            };
            if (id) {
                await api(`/api/admin/artifacts/${id}`, { method: "PUT", body: JSON.stringify(payload) });
            } else {
                await api("/api/admin/artifacts", { method: "POST", body: JSON.stringify(payload) });
            }
            setMsg("artifactMsg", "保存成功");
            await loadArtifacts();
        } catch (e) { setMsg("artifactMsg", e.message, false); }
    }

    function exportArtifacts() {
        window.open("/api/admin/artifacts/export", "_blank");
    }

    function setMenuByRole(role, permissions) {
        const hidden = new Set();
        if (role === "CONTENT_REVIEWER") {
            hidden.add("adminPage");
            hidden.add("artifactPage");
            hidden.add("rbacPage");
        }
        if (role === "DATA_ADMIN") {
            hidden.add("rbacPage");
        }
        document.querySelectorAll(".menu-btn").forEach(btn => {
            const page = btn.getAttribute("data-page");
            btn.style.display = hidden.has(page) ? "none" : "block";
        });
    }

    async function loadReviewContents() {
        try {
            const status = document.getElementById("reviewFilterStatus").value;
            const path = status ? `/api/admin/reviews?status=${encodeURIComponent(status)}` : "/api/admin/reviews";
            const data = await api(path);
            document.getElementById("reviewTable").innerHTML =
                "<tr><th>ID</th><th>类型</th><th>来源</th><th>提交人</th><th>文本</th><th>风险分</th><th>状态</th><th>拒绝原因</th><th>审核人</th><th>操作</th></tr>" +
                data.map(x => `<tr><td>${x.id}</td><td>${x.contentType}</td><td>${x.sourceSystem}</td><td>${x.submitter}</td><td>${x.contentText}</td><td>${x.riskScore}</td><td>${x.reviewStatus}</td><td>${x.rejectReason || ""}</td><td>${x.reviewer || ""}</td><td>${x.reviewStatus === "PENDING" ? `<button class="btn btn-success" onclick="reviewAction(${x.id}, 'APPROVED')">通过</button> <button class="btn btn-danger" onclick="reviewAction(${x.id}, 'REJECTED')">拒绝</button>` : ""}</td></tr>`).join("");
            setMsg("reviewMsg", "审核列表加载成功");
        } catch (e) { setMsg("reviewMsg", e.message, false); }
    }

    async function createReviewContent() {
        try {
            const payload = {
                contentType: document.getElementById("newReviewType").value,
                sourceSystem: document.getElementById("newReviewSourceSystem").value.trim(),
                submitter: document.getElementById("newReviewSubmitter").value.trim(),
                contentText: document.getElementById("newReviewText").value.trim(),
                contentUrl: document.getElementById("newReviewUrl").value.trim() || null,
                riskScore: Number(document.getElementById("newReviewRiskScore").value || 0)
            };
            await api("/api/admin/reviews", { method: "POST", body: JSON.stringify(payload) });
            setMsg("reviewMsg", "新增待审核内容成功");
            await loadReviewContents();
        } catch (e) { setMsg("reviewMsg", e.message, false); }
    }

    async function reviewAction(id, status) {
        try {
            let rejectReason = null;
            if (status === "REJECTED") {
                rejectReason = prompt("请输入拒绝原因:");
                if (!rejectReason || !rejectReason.trim()) throw new Error("拒绝原因不能为空");
            }
            await api(`/api/admin/reviews/${id}/action`, { method: "PATCH", body: JSON.stringify({ reviewStatus: status, rejectReason }) });
            setMsg("reviewMsg", "审核操作成功");
            await loadReviewContents();
        } catch (e) { setMsg("reviewMsg", e.message, false); }
    }

    tryAutoLogin();
</script>
</body>
</html>
