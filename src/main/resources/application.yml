server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    url: jdbc:mysql://localhost:3306/overseas_artifacts?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.security: info

security:
  jwt:
    secret: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    expire-seconds: 86400

integration:
  # mock: 不请求外网，返回固定模拟 JSON；real: 向以下 baseUrl 发起真实 HTTP
  mode: mock
  user-system-base-url: http://localhost:9001
  artifact-system-base-url: http://localhost:9002
  kg-system-base-url: http://localhost:9003
  paths:
    users: /api/v1/users
    artifacts: /api/v1/artifacts
    review-callback: /api/v1/content/review-result
    kg-entities: /api/v1/kg/entities
    kg-relations: /api/v1/kg/relations
    kg-triples: /api/v1/kg/triples
    kg-sync-jobs: /api/v1/kg/sync/jobs

backup:
  directory: backups
  # 默认示例 key，请在生产环境替换为你自己的 16/24/32 字节 base64 key
  aes-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

image-moderation:
  # mock: 本地关键词模拟; real: 阿里云 Green; local: 本地 NSFW ONNX 模型
  mode: local
  provider: aliyun
  aliyun-endpoint: green-cip.cn-shanghai.aliyuncs.com
  aliyun-service: baselineCheck_global
  # 阿里云 AccessKey（mode=real 时需要）
  aliyun-access-key-id: ${ALIBABA_CLOUD_ACCESS_KEY_ID:}
  aliyun-access-key-secret: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}
  # 本地 NSFW 模型配置（mode=local 时生效）
  local-model-enabled: true
  local-model-path: models/nsfw_model.onnx
  # 启动时若本地模型文件不存在，自动从此 URL 下载（HuggingFace 国内镜像）
  local-model-download-url: https://hf-mirror.com/onnx-community/nsfw-classifier-ONNX/resolve/main/onnx/model.onnx
